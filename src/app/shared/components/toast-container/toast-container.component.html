<div class="toast-container">
  <article class="toast" *ngFor="let toast of toastService.toasts$ | async" [class]="'toast toast-' + toast.type">
    <div>
      <strong *ngIf="toast.title">{{ toast.title }}</strong>
      <p>{{ toast.message }}</p>
    </div>
    <button type="button" (click)="toastService.dismiss(toast.id)">x</button>
  </article>
</div>
