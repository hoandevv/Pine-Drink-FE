<div class="space-y-lg">
  <!-- Error Message -->
  <div *ngIf="errorMessage" class="p-md bg-error/10 border border-error rounded-xl mb-md">
    <p class="text-error text-body-sm font-medium">{{ errorMessage }}</p>
  </div>

  <div>
    <h2 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-xs">Đặt lại mật khẩu</h2>
    <p class="font-body-md text-body-md text-secondary">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="submit()" class="space-y-md">
    <div class="space-y-xs">
      <label class="block font-label-lg text-on-surface">Mật khẩu mới</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-secondary">lock</span>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="Tối thiểu 6 ký tự" 
          class="w-full pl-12 pr-md py-sm bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-body-md font-body-md transition-all outline-none" 
        />
      </div>
      <p *ngIf="password?.touched && password?.hasError('required')" class="text-error text-label-sm mt-1">Vui lòng nhập mật khẩu mới.</p>
      <p *ngIf="password?.touched && password?.hasError('minlength')" class="text-error text-label-sm mt-1">Mật khẩu phải có tối thiểu 6 ký tự.</p>
    </div>

    <div class="space-y-xs">
      <label class="block font-label-lg text-on-surface">Xác nhận mật khẩu mới</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-secondary">lock_reset</span>
        <input 
          type="password" 
          formControlName="confirmPassword" 
          placeholder="Nhập lại mật khẩu" 
          class="w-full pl-12 pr-md py-sm bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-body-md font-body-md transition-all outline-none" 
        />
      </div>
      <p *ngIf="confirmPassword?.touched && confirmPassword?.hasError('required')" class="text-error text-label-sm mt-1">Vui lòng xác nhận mật khẩu.</p>
      <p *ngIf="confirmPassword?.touched && resetForm.hasError('mismatch')" class="text-error text-label-sm mt-1">Mật khẩu xác nhận không khớp.</p>
    </div>

    <button 
      type="submit" 
      class="w-full py-sm mt-md bg-primary text-white rounded-xl font-headline-md text-label-lg shadow-md hover:bg-primary-container hover:text-on-primary-container hover:shadow-lg active:scale-[0.98] transition-all disabled:opacity-50 disabled:active:scale-100 disabled:hover:shadow-md"
      [disabled]="submitting || resetForm.invalid || !resetToken"
    >
      {{ submitting ? 'Đang cập nhật...' : 'Cập nhật mật khẩu' }}
    </button>
  </form>

  <p class="text-center text-body-md text-secondary mt-xl">
    <a routerLink="/auth/login" class="text-primary font-bold hover:underline inline-flex items-center gap-1">
      <span class="material-symbols-outlined text-[16px]">arrow_back</span>
      Hủy và quay lại Đăng nhập
    </a>
  </p>
</div>
