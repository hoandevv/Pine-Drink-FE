<app-page-header title="Accounts" description="Quản lý staff, tài khoản và phân quyền cho từng vai trò.">
  <button type="button" class="btn btn-primary">+ Tạo tài khoản</button>
</app-page-header>

<section class="account-panel">
  <article *ngFor="let account of accounts" class="account-row">
    <span class="material-symbols-outlined">admin_panel_settings</span>
    <div>
      <h3>{{ account.name }}</h3>
      <p>{{ account.email }}</p>
    </div>
    <strong>{{ account.role }}</strong>
    <em>{{ account.status }}</em>
  </article>
</section>
