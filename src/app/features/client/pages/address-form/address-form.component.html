<div class="address-form-page">
  <div class="page-header">
    <button class="back-button" (click)="cancel()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1>{{ isEditMode ? ('address.editTitle' | translate) : ('address.addTitle' | translate) }}</h1>
  </div>

  <div class="form-container">
    <form [formGroup]="addressForm" (ngSubmit)="onSubmit()">
      <!-- Map Picker Mode -->
      <div class="form-section">
        <div class="form-grid">
          <div class="form-group">
            <label for="receiverNameMap">
              {{ 'address.receiverName' | translate }}
              <span class="required">*</span>
            </label>
            <input
              id="receiverNameMap"
              type="text"
              formControlName="receiverName"
              [class.error]="isFieldInvalid('receiverName')"
              placeholder="{{ 'address.receiverNamePlaceholder' | translate }}"
            />
            <span *ngIf="isFieldInvalid('receiverName')" class="error-message">
              {{ getFieldError('receiverName') }}
            </span>
          </div>

          <div class="form-group">
            <label for="receiverPhoneMap">
              {{ 'address.receiverPhone' | translate }}
              <span class="required">*</span>
            </label>
            <input
              id="receiverPhoneMap"
              type="tel"
              formControlName="receiverPhone"
              [class.error]="isFieldInvalid('receiverPhone')"
              placeholder="{{ 'address.receiverPhonePlaceholder' | translate }}"
            />
            <span *ngIf="isFieldInvalid('receiverPhone')" class="error-message">
              {{ getFieldError('receiverPhone') }}
            </span>
          </div>
        </div>

        <div class="map-section">
          <app-map-picker (locationSelected)="onLocationSelected($event)"></app-map-picker>
        </div>

        <div class="form-group">
          <label for="addressLineMap">
            {{ 'address.addressLine' | translate }}
            <span class="required">*</span>
          </label>
          <input
            id="addressLineMap"
            type="text"
            formControlName="addressLine"
            [class.error]="isFieldInvalid('addressLine')"
            placeholder="{{ 'address.addressLinePlaceholder' | translate }}"
          />
          <span *ngIf="isFieldInvalid('addressLine')" class="error-message">
            {{ getFieldError('addressLine') }}
          </span>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="wardMap">{{ 'address.ward' | translate }}</label>
            <input
              id="wardMap"
              type="text"
              formControlName="ward"
              placeholder="{{ 'address.wardPlaceholder' | translate }}"
            />
          </div>

          <div class="form-group">
            <label for="districtMap">{{ 'address.district' | translate }}</label>
            <input
              id="districtMap"
              type="text"
              formControlName="district"
              placeholder="{{ 'address.districtPlaceholder' | translate }}"
            />
          </div>

          <div class="form-group">
            <label for="cityMap">{{ 'address.city' | translate }}</label>
            <input
              id="cityMap"
              type="text"
              formControlName="city"
              placeholder="{{ 'address.cityPlaceholder' | translate }}"
            />
          </div>
        </div>

        <div class="info-note">
          <span class="material-symbols-outlined">info</span>
          <span>{{ 'address.mapNote' | translate }}</span>
        </div>
      </div>

      <!-- Default Checkbox -->
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isDefault" />
          <span class="checkbox-text">{{ 'address.setAsDefault' | translate }}</span>
        </label>
      </div>

      <!-- Action Buttons -->
      <div class="form-actions">
        <button type="button" class="secondary-button" (click)="cancel()">
          {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" class="primary-button" [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">
            {{ isEditMode ? ('common.update' | translate) : ('common.save' | translate) }}
          </span>
          <span *ngIf="isSubmitting" class="button-loading">
            <span class="material-symbols-outlined spinning">progress_activity</span>
            {{ 'common.loading' | translate }}
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
